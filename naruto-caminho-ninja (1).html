<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Caminho Ninja — RPG Incremental</title>
<style>
:root{
  --bg-0:#0b0d14;
  --bg-1:#11141d;
  --bg-2:#171b27;
  --bg-3:#1e2333;
  --line:#2a3044;
  --line-soft:#232838;
  --text-0:#eef0f6;
  --text-1:#b7bdd0;
  --text-2:#7e8499;
  --orange:#ff8a3d;
  --orange-dim:#c9682a;
  --chakra:#3fb0ff;
  --chakra-dim:#2a7fb8;
  --sharingan:#e8433f;
  --gold:#f2c14e;
  --green:#57c785;
  --purple:#a179e0;
  --pink:#e879b8;
  --rank-d:#8a8f9e;
  --rank-c:#57c785;
  --rank-b:#3fb0ff;
  --rank-a:#a179e0;
  --rank-s:#f2c14e;
  --rank-ss:#ff8a3d;
  --rank-sss:#e8433f;
  --font-display:'Yuji Syuku','Noto Serif JP',serif;
  --font-body:'Zen Kaku Gothic New','Segoe UI',sans-serif;
  --font-mono:'Zen Kaku Gothic New',monospace;
  --radius:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:
    radial-gradient(ellipse at 15% -10%, rgba(255,138,61,0.10), transparent 45%),
    radial-gradient(ellipse at 85% 0%, rgba(63,176,255,0.08), transparent 40%),
    var(--bg-0);
  color:var(--text-0);
  font-family:var(--font-body);
  overflow:hidden;
}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;}
::-webkit-scrollbar-thumb:hover{background:var(--orange-dim);}

.app{display:flex;height:100vh;width:100vw;}

/* ---------- SIDEBAR ---------- */
.sidebar{
  width:220px;flex-shrink:0;background:var(--bg-1);
  border-right:1px solid var(--line-soft);
  display:flex;flex-direction:column;
  padding:14px 10px;overflow-y:auto;
}
.brand{
  display:flex;align-items:center;gap:10px;padding:6px 8px 16px 8px;
  border-bottom:1px solid var(--line-soft);margin-bottom:10px;
}
.brand-emblem{
  width:34px;height:34px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, var(--orange), var(--orange-dim) 70%);
  box-shadow:0 0 14px rgba(255,138,61,0.5);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:18px;color:#1a0f05;font-weight:700;
}
.brand-text{display:flex;flex-direction:column;}
.brand-text b{font-family:var(--font-display);font-size:15px;letter-spacing:0.5px;}
.brand-text span{font-size:10px;color:var(--text-2);}

.nav-group-label{
  font-size:10px;text-transform:uppercase;letter-spacing:1.2px;
  color:var(--text-2);margin:12px 8px 6px 8px;font-weight:600;
}
.nav-btn{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:8px;cursor:pointer;
  color:var(--text-1);font-size:13px;font-weight:500;
  border:1px solid transparent;position:relative;
  transition:background .12s,color .12s;
  user-select:none;
}
.nav-btn:hover{background:var(--bg-2);color:var(--text-0);}
.nav-btn.active{background:linear-gradient(90deg, rgba(255,138,61,0.16), rgba(255,138,61,0.02));color:var(--orange);border-color:rgba(255,138,61,0.25);}
.nav-btn .ico{width:18px;text-align:center;font-size:15px;}
.nav-btn .badge{
  margin-left:auto;background:var(--sharingan);color:#fff;font-size:10px;
  padding:1px 6px;border-radius:10px;font-weight:700;
}

/* ---------- MAIN ---------- */
.main{flex:1;display:flex;flex-direction:column;min-width:0;}

.topbar{
  display:flex;align-items:center;gap:18px;
  padding:10px 20px;border-bottom:1px solid var(--line-soft);
  background:var(--bg-1);flex-wrap:wrap;
}
.top-stat{display:flex;flex-direction:column;min-width:90px;}
.top-stat .lbl{font-size:9px;text-transform:uppercase;color:var(--text-2);letter-spacing:0.8px;}
.top-stat .val{font-size:14px;font-weight:700;}
.top-stat.gold .val{color:var(--gold);}
.top-stat.chakra .val{color:var(--chakra);}
.top-stat.hp .val{color:var(--green);}
.xp-wrap{flex:1;min-width:160px;display:flex;flex-direction:column;gap:3px;}
.xp-top{display:flex;justify-content:space-between;font-size:10px;color:var(--text-2);}
.bar-track{height:8px;background:var(--bg-3);border-radius:5px;overflow:hidden;border:1px solid var(--line-soft);}
.bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--orange-dim),var(--orange));transition:width .25s;}
.bar-fill.chakra{background:linear-gradient(90deg,var(--chakra-dim),var(--chakra));}
.bar-fill.hp{background:linear-gradient(90deg,#2a8a55,var(--green));}
.bar-fill.stam{background:linear-gradient(90deg,#8a6f2a,var(--gold));}
.top-right{display:flex;gap:8px;align-items:center;margin-left:auto;}
.icon-btn{
  background:var(--bg-2);border:1px solid var(--line-soft);color:var(--text-1);
  border-radius:8px;padding:7px 10px;font-size:12px;cursor:pointer;
}
.icon-btn:hover{border-color:var(--orange-dim);color:var(--orange);}

.content{flex:1;overflow-y:auto;padding:18px 22px 60px 22px;}
.screen{display:none;}
.screen.active{display:block;animation:fadein .18s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

h1.screen-title{font-family:var(--font-display);font-size:22px;margin:0 0 4px 0;color:var(--text-0);}
p.screen-sub{color:var(--text-2);font-size:12.5px;margin:0 0 18px 0;}

.grid{display:grid;gap:14px;}
.grid.cols-2{grid-template-columns:1fr 1fr;}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-4{grid-template-columns:repeat(4,1fr);}
.grid.auto{grid-template-columns:repeat(auto-fill,minmax(230px,1fr));}

.card{
  background:var(--bg-1);border:1px solid var(--line-soft);border-radius:var(--radius);
  padding:14px;position:relative;
}
.card h3{margin:0 0 8px 0;font-size:13.5px;color:var(--text-0);display:flex;align-items:center;gap:8px;}
.card h3 .ico{font-size:16px;}
.card-sub{color:var(--text-2);font-size:11px;margin:-4px 0 10px 0;}

.stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px dashed var(--line-soft);font-size:12.5px;}
.stat-row:last-child{border-bottom:none;}
.stat-row .name{color:var(--text-1);display:flex;align-items:center;gap:6px;}
.stat-row .value{font-weight:700;color:var(--text-0);}
.stat-row .gain{color:var(--green);font-size:10.5px;margin-left:6px;}

.btn{
  background:var(--bg-3);border:1px solid var(--line);color:var(--text-0);
  padding:8px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;
  transition:transform .08s, border-color .12s, box-shadow .12s;
}
.btn:hover{border-color:var(--orange-dim);}
.btn:active{transform:scale(0.97);}
.btn.primary{background:linear-gradient(180deg,var(--orange),var(--orange-dim));border-color:var(--orange-dim);color:#1a0f05;}
.btn.primary:hover{box-shadow:0 0 14px rgba(255,138,61,0.4);}
.btn.chakra{background:linear-gradient(180deg,var(--chakra),var(--chakra-dim));border-color:var(--chakra-dim);color:#03131f;}
.btn.small{padding:5px 9px;font-size:11px;}
.btn.full{width:100%;}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none;}
.btn.danger{background:linear-gradient(180deg,#e8433f,#a52c29);border-color:#a52c29;color:#fff;}
.btn.ghost{background:transparent;}

.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.3px;}
.tag.d{background:rgba(138,143,158,0.18);color:var(--rank-d);}
.tag.c{background:rgba(87,199,133,0.18);color:var(--rank-c);}
.tag.b{background:rgba(63,176,255,0.18);color:var(--rank-b);}
.tag.a{background:rgba(161,121,224,0.18);color:var(--rank-a);}
.tag.s{background:rgba(242,193,78,0.18);color:var(--rank-s);}
.tag.ss{background:rgba(255,138,61,0.18);color:var(--rank-ss);}
.tag.sss{background:rgba(232,67,63,0.18);color:var(--rank-sss);}

.tag.common{background:rgba(183,189,208,0.15);color:#b7bdd0;}
.tag.incomum{background:rgba(87,199,133,0.18);color:var(--green);}
.tag.raro{background:rgba(63,176,255,0.18);color:var(--chakra);}
.tag.epico{background:rgba(161,121,224,0.18);color:var(--purple);}
.tag.lendario{background:rgba(242,193,78,0.18);color:var(--gold);}
.tag.mitico{background:rgba(232,67,63,0.2);color:var(--sharingan);}

.pillbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.pill{
  padding:6px 12px;border-radius:20px;background:var(--bg-2);border:1px solid var(--line-soft);
  font-size:11.5px;cursor:pointer;color:var(--text-1);font-weight:600;
}
.pill.active{background:rgba(255,138,61,0.16);color:var(--orange);border-color:var(--orange-dim);}

.prog-mini{height:5px;background:var(--bg-3);border-radius:4px;overflow:hidden;margin-top:6px;border:1px solid var(--line-soft);}
.prog-mini i{display:block;height:100%;background:linear-gradient(90deg,var(--chakra-dim),var(--chakra));}

.list-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 12px;border:1px solid var(--line-soft);border-radius:8px;
  margin-bottom:8px;background:var(--bg-1);gap:10px;
}
.list-item .li-main{flex:1;min-width:0;}
.list-item .li-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.list-item .li-desc{font-size:11px;color:var(--text-2);margin-top:3px;}
.list-item.locked{opacity:0.45;}
.list-item.learned{border-color:rgba(87,199,133,0.35);}
.list-item.equipped{border-color:rgba(255,138,61,0.45);background:rgba(255,138,61,0.05);}

.toast-wrap{position:fixed;top:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:8px;}
.toast{
  background:var(--bg-2);border:1px solid var(--line);border-left:4px solid var(--orange);
  padding:10px 14px;border-radius:8px;font-size:12.5px;min-width:220px;max-width:320px;
  box-shadow:0 6px 24px rgba(0,0,0,0.4);animation:slidein .2s ease;
}
.toast b{color:var(--orange);}
.toast.xp{border-left-color:var(--chakra);}
.toast.xp b{color:var(--chakra);}
.toast.item{border-left-color:var(--gold);}
.toast.item b{color:var(--gold);}
.toast.warn{border-left-color:var(--sharingan);}
.toast.warn b{color:var(--sharingan);}
@keyframes slidein{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:none;}}
@keyframes fadeout{to{opacity:0;transform:translateX(20px);}}

.modal-bg{
  position:fixed;inset:0;background:rgba(5,6,10,0.72);backdrop-filter:blur(2px);
  display:none;align-items:center;justify-content:center;z-index:1000;padding:20px;
}
.modal-bg.active{display:flex;}
.modal{
  background:var(--bg-1);border:1px solid var(--line);border-radius:14px;
  max-width:480px;width:100%;padding:20px;max-height:85vh;overflow-y:auto;
}
.modal h2{font-family:var(--font-display);margin:0 0 10px 0;font-size:18px;}
.modal-close{position:absolute;top:14px;right:16px;cursor:pointer;color:var(--text-2);font-size:18px;}
.modal.battle{max-width:620px;}

.clan-card{
  border:1px solid var(--line-soft);border-radius:10px;padding:12px;cursor:pointer;
  background:var(--bg-2);transition:border-color .12s;
}
.clan-card:hover{border-color:var(--orange-dim);}
.clan-card.selected{border-color:var(--orange);background:rgba(255,138,61,0.08);}
.clan-card h4{margin:0 0 4px 0;font-size:13px;}
.clan-card p{margin:0;font-size:11px;color:var(--text-2);line-height:1.4;}

.progress-label{display:flex;justify-content:space-between;font-size:10.5px;color:var(--text-2);margin-bottom:3px;}

.affinity-orb{
  width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:20px;border:2px solid var(--line);position:relative;margin:0 auto 6px auto;
  background:var(--bg-2);
}
.affinity-wrap{text-align:center;font-size:10.5px;color:var(--text-2);}
.affinity-wrap b{display:block;font-size:11.5px;color:var(--text-0);margin-top:2px;}

.mobile-tabbar{display:none;}

@media (max-width:880px){
  .sidebar{display:none;}
  .app{flex-direction:column;}
  .content{padding:12px 12px 76px 12px;}
  .grid.cols-2,.grid.cols-3,.grid.cols-4{grid-template-columns:1fr;}
  .topbar{padding:8px 10px;gap:10px;}
  .mobile-tabbar{
    display:flex;position:fixed;bottom:0;left:0;right:0;height:58px;
    background:var(--bg-1);border-top:1px solid var(--line-soft);z-index:200;
    overflow-x:auto;
  }
  .mobile-tabbar .mnav{
    flex:1;min-width:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:var(--text-2);font-size:9px;gap:2px;cursor:pointer;
  }
  .mobile-tabbar .mnav.active{color:var(--orange);}
  .mobile-tabbar .mnav .ico{font-size:16px;}
}
.bar-fill.enemy{background:linear-gradient(90deg,#a52c29,var(--sharingan));}
.battle-move{
  display:flex;flex-direction:column;align-items:flex-start;gap:2px;
  padding:9px 10px;border-radius:8px;background:var(--bg-2);border:1px solid var(--line-soft);
  cursor:pointer;text-align:left;color:var(--text-0);font-size:11.5px;font-weight:600;
}
.battle-move:hover{border-color:var(--orange-dim);}
.battle-move:disabled,.battle-move.disabled{opacity:0.35;cursor:not-allowed;}
.battle-move .bm-sub{font-size:9.5px;color:var(--text-2);font-weight:500;}
.battle-vs{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
.battle-side{flex:1;}
.battle-side .bs-name{font-size:12px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:6px;}
.battle-ico{font-size:30px;}
.hidden{display:none !important;}

.flex{display:flex;}
.flex.gap{gap:8px;}
.flex.wrap{flex-wrap:wrap;}
.flex.between{justify-content:space-between;}
.flex.center{align-items:center;}
.muted{color:var(--text-2);}
.small{font-size:11px;}
.mt8{margin-top:8px;}
.mt14{margin-top:14px;}
.mb0{margin-bottom:0;}
.section-divider{border:none;border-top:1px solid var(--line-soft);margin:16px 0;}
.combat-bar-wrap{margin-bottom:8px;}
.combat-log{
  background:var(--bg-0);border:1px solid var(--line-soft);border-radius:8px;
  padding:8px 10px;height:110px;overflow-y:auto;font-size:11px;color:var(--text-1);
  display:flex;flex-direction:column-reverse;
}
.combat-log div{padding:2px 0;border-bottom:1px dashed var(--line-soft);}
.talent-node{
  border:1px solid var(--line-soft);border-radius:10px;padding:10px;background:var(--bg-2);
  text-align:center;cursor:pointer;
}
.talent-node.bought{border-color:var(--green);background:rgba(87,199,133,0.08);}
.talent-node.locked{opacity:0.4;cursor:not-allowed;}
.talent-node .tn-ico{font-size:20px;}
.talent-node .tn-name{font-size:11px;font-weight:700;margin-top:4px;}
.talent-node .tn-desc{font-size:9.5px;color:var(--text-2);margin-top:2px;}
.talent-node .tn-cost{font-size:10px;color:var(--gold);margin-top:4px;}
.ach-badge{
  border:1px solid var(--line-soft);border-radius:10px;padding:10px;text-align:center;background:var(--bg-2);
}
.ach-badge.done{border-color:var(--gold);background:rgba(242,193,78,0.08);}
.ach-badge .ab-ico{font-size:22px;}
.ach-badge .ab-name{font-size:10.5px;font-weight:700;margin-top:4px;}
.ach-badge .ab-desc{font-size:9px;color:var(--text-2);margin-top:2px;}
</style>
</head>
<body>
<div class="toast-wrap" id="toastWrap"></div>

<div class="modal-bg" id="modalBg">
  <div class="modal" id="modalBox" style="position:relative;">
    <span class="modal-close" onclick="closeModal()">✕</span>
    <div id="modalContent"></div>
  </div>
</div>

<div class="app" id="app"></div>

<script id="game-script">
/* =========================================================================
   CAMINHO NINJA — DADOS DO JOGO
   ========================================================================= */

const RANKS = [
  {id:'estudante', name:'Estudante da Academia', lvl:1,  ico:'📘'},
  {id:'genin',     name:'Genin',                 lvl:5,  ico:'🍃'},

  {id:'anbu',      name:'ANBU',                  lvl:42, ico:'🎭'},
  {id:'kage',      name:'Hokage',                lvl:60, ico:'🔥'},
];
function rankForLevel(lvl){
  let r = RANKS[0];
  for(const rk of RANKS){ if(lvl>=rk.lvl) r=rk; }
  return r;
}
function nextRank(lvl){
  for(const rk of RANKS){ if(lvl<rk.lvl) return rk; }
  return null;
}

/* ---------------- CLÃS ---------------- */
const CLANS = {

    dojutsu:null, passive:'Poder de Genjutsu +20%.'
  },
  aburame:{
    name:'Aburame', ico:'🪲', element:'nenhum',
    desc:'Usuários de insetos kikaichu, com controle de chakra impecável.',

    name:'Inuzuka', ico:'🐺', element:'nenhum',

    bonus:{speed:0.35, force:0.10, statLabel:'+35% Velocidade, +10% Força'},
    dojutsu:null, passive:'Velocidade de missão +10%.'
  },
  sarutobi:{
    name:'Sarutobi', ico:'🐒', element:'fogo',
    desc:'Linhagem equilibrada com grande versatilidade em todas as artes ninja.',
    bonus:{force:0.10,speed:0.10,intel:0.10,chakra:0.10, statLabel:'+10% em todos os atributos'},
    dojutsu:null, passive:'Nenhuma fraqueza — desenvolvimento balanceado.'
  },

/* ---------------- ELEMENTOS ---------------- */

const MISSION_VERBS = ['Escoltar comerciante em','Capturar bandido fugitivo perto de','Investigar distúrbios em',
  'Recuperar pergaminho roubado de','Eliminar grupo de ladrões perto de','Proteger caravana até',
  'Rastrear espião inimigo em','Resgatar refém em','Neutralizar sabotador em','Patrulhar fronteira de'];
const MISSION_PLACES = ['Vila da Névoa','Vila da Areia','País das Ondas','Floresta da Morte','Vila da Cachoeira',
  'Passo Rochoso','Vila da Chuva','País do Ferro','Ponte Naruto','País do Chá','Ruínas Antigas','Vila da Erva'];

function buildMissionList(){
  const list=[]; let uid=1;
  MISSION_RANKS.forEach(rk=>{
    const info = MISSION_RANK_INFO[rk];
    for(let i=0;i<7;i++){
      const verb = MISSION_VERBS[(i*3+rk.length)%MISSION_VERBS.length];
      const place = MISSION_PLACES[(i*5+rk.length*2)%MISSION_PLACES.length];
      list.push({
        id:'m'+(uid++), rank:rk, name:`${verb} ${place}`,
        minLevel:info.minLevel + i*2,
        duration: info.dur + i*4,
        xp: Math.round(info.xp * (1+i*0.25)),
        ryo: Math.round(info.ryo * (1+i*0.18)),
        stamina: 10 + MISSION_RANKS.indexOf(rk)*4,
        tag: info.tag,
        dropChance: 0.16 + MISSION_RANKS.indexOf(rk)*0.03,
      });
    }
  });
  return list;
}

const SCROLL_NAMES = ['Pergaminho de Técnicas Básicas','Pergaminho de Estratégia','Pergaminho Proibido Fragmentado','Pergaminho Ancestral do Clã'];

function buildEquipmentList(){
  const list=[]; let uid=1;
  function makeSet(names, slot){
    names.forEach((n,i)=>{
      RARITIES.forEach((r,ri)=>{
        if(ri > i+1) return; // higher-tier names only appear at higher rarities
        list.push({
          id:'e'+(uid++), name:`${n} ${r.name}`, slot, rarity:r.id,
          statKey:EQUIP_SLOTS[slot].stat,
          bonus: Math.round((6 + i*4) * r.mult),
          reqLevel: Math.max(1, i*7 + ri*4),
          cost: Math.round((30 + i*40) * r.mult),
        });
      });
    });
  }
  makeSet(WEAPON_NAMES,'arma');
  makeSet(ARMOR_NAMES,'armadura');
  makeSet(ACC_NAMES,'acessorio');
  makeSet(SCROLL_NAMES,'pergaminho');
  return list;
}

/* ---- derived multipliers from talents / clan / achievements / dojutsu ---- */
function talentEffect(effect){
  let total=0;
  TALENTS.filter(t=>t.effect===effect).forEach(t=>{
    const pts = S.talents[t.id]||0;
    total += pts*t.per;
  });
  return total;
}
function achievementEffect(effect){
  let total=0;
  ACHIEVEMENTS.forEach(a=>{
    if(S.achievementsUnlocked.includes(a.id) && a.bonus[effect]) total+=a.bonus[effect];
  });
  return total;
}
function getMult(effect){
  return 1 + talentEffect(effect) + achievementEffect(effect);
}
function clanOf(){ return S.clan ? CLANS[S.clan] : null; }

function equippedBonusFor(statKey){
  let total=0;
  Object.values(S.equipped).forEach(itemId=>{
    if(!itemId) return;
    const item = EQUIP_LIST.find(e=>e.id===itemId);
    if(item && item.statKey===statKey) total += item.bonus;
  });
  return total;
}
function summonBonus(key){
  if(!S.equipped.invocacao) return 0;
  const sm = SUMMONS.find(x=>x.id===S.equipped.invocacao);
  return (sm && sm.bonus[key]) ? sm.bonus[key] : 0;
}

function dojutsuBonusMult(){
  if(!S.dojutsu.type) return {taijutsu:1, genjutsu:1, ninjutsu:1, crit:0};
  const stage = S.dojutsu.stage;
  if(S.dojutsu.type==='sharingan'){
    return {taijutsu:1, genjutsu:1+stage*0.25, ninjutsu:1+stage*0.15, crit:stage*0.04};
  }
  if(S.dojutsu.type==='byakugan'){
    return {taijutsu:1+stage*0.3, genjutsu:1, ninjutsu:1, crit:stage*0.05};
  }
  if(S.dojutsu.type==='rinnegan'){
    return {taijutsu:1+stage*0.2, genjutsu:1+stage*0.2, ninjutsu:1+stage*0.3, crit:stage*0.06};
  }
  return {taijutsu:1, genjutsu:1, ninjutsu:1, crit:0};
}

function recalcStats(){
  const clan = clanOf();
  const allStatMult = getMult('allStat');
  ['force','speed','intel','chakraControl'].forEach(k=>{
    let base = S.stats[k];
    S.stats[k] = base; // base already tracks raw trained value; display applies mult separately via effectiveStat()
  });
}
function effectiveStat(key){
  const clan = clanOf();
  let val = S.stats[key];
  if(clan && clan.bonus[key]) val *= (1+clan.bonus[key]);
  val += equippedBonusFor(key);
  val *= getMult('allStat');
  if(key==='chakraControl'){ /* no dojutsu direct */ }
  return Math.round(val*10)/10;
}
function effectiveHpMax(){
  const clan = clanOf();
  let val = S.stats.hpMax;
  if(clan && clan.bonus.hp) val *= (1+clan.bonus.hp);
  val += equippedBonusFor('hp');
  val += summonBonus('hp')*val;
  val *= getMult('allStat');
  return Math.round(val);
}
function effectiveChakraMax(){
  const clan = clanOf();
  let val = S.stats.chakraMax;
  if(clan && clan.bonus.chakra) val *= (1+clan.bonus.chakra);
  val += summonBonus('chakra')*val;
  val *= getMult('chakraMult');
  val *= getMult('allStat');
  return Math.round(val);
}

function xpToNext(level){
  return Math.round(45 * Math.pow(level,1.55) + 20);
}

function saveGame(silent){
  try{
    localStorage.setItem(SAVE_KEY, JSON.stringify(S));
    if(!silent){

  }catch(e){ console.error('erro ao salvar', e); }
}
function loadGame(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    const loaded = JSON.parse(raw);
    S = Object.assign(freshState(), loaded);
    // deep-merge nested defaults for safety with older saves
    S.stats = Object.assign(freshState().stats, loaded.stats||{});
    S.flags = Object.assign(freshState().flags, loaded.flags||{});
    S.equipped = Object.assign(freshState().equipped, loaded.equipped||{});
    S.prestige = Object.assign(freshState().prestige, loaded.prestige||{});
    return true;
  }catch(e){ console.error('erro ao carregar', e); return false; }
}
function hardReset(){

  S = freshState();
}

function formatNum(n){
  n = Math.floor(n);
  if(n>=1e12) return (n/1e12).toFixed(2)+'T';
  if(n>=1e9) return (n/1e9).toFixed(2)+'B';
  if(n>=1e6) return (n/1e6).toFixed(2)+'M';
  if(n>=1e4) return (n/1e3).toFixed(1)+'K';
  return n.toLocaleString('pt-BR');
}

  </div>
  <div class="grid auto">
    ${list.map(j=>renderJutsuCard(j)).join('')}
  </div>`;

function jutsuReqMet(j){
  const req = j.req||{};
  if(req.level && S.level < req.level) return false;
  if(req.clan && S.clan !== req.clan) return false;
  if(req.mentor && !S.mentorsLearned.includes(req.mentor)) return false;
  if(req.stat && effectiveStat(req.stat) < req.min) return false;
  if(req.dojutsuStage){
    const stages = {sharingan_3:['sharingan',3],sharingan_mk:['sharingan',4],rinnegan:['rinnegan',1]};
    const need = stages[req.dojutsuStage];
    if(need){ if(S.dojutsu.type!==need[0] || S.dojutsu.stage<need[1]) return false; }
  }
  if(req.elementAff){
    for(const k in req.elementAff){ if((S.elementAffinity[k]||0) < req.elementAff[k]) return false; }
  }
  return true;
}
function jutsuXpCost(j){
  return Math.round((30 + j.tier*35) * (1-talentEffect('jutsuDiscount')));
}
function renderJutsuCard(j){
  const learned = S.jutsuLearned.includes(j.id);
  const canLearn = jutsuReqMet(j);
  const cost = jutsuXpCost(j);
  return `<div class="list-item ${learned?'learned':(canLearn?'':'locked')}" style="display:block;">
    <div class="li-title">${j.name} <span class="tag ${j.rankLetter.toLowerCase()}">${j.rankLetter}</span>
      ${j.element?`<span class="small muted">${ALL_ELEMENTS[j.element]?ALL_ELEMENTS[j.element].ico:''}</span>`:''}

    <div class="li-desc">${j.desc}</div>
    <div class="flex between mt8" style="align-items:center;">
      <span class="small muted">Custo chakra: ${j.chakra} ${(!learned)?`• Custo XP p/ aprender: ${cost}`:''}</span>
      ${learned?'<span class="small" style="color:var(--green);font-weight:700;">✔ Aprendido</span>':
        `<button class="btn small ${canLearn?'primary':''}" onclick="learnJutsu('${j.id}')" ${(!canLearn || S.xp<cost)?'disabled':''}>Aprender</button>`}
    </div>
  </div>`;
}

/* =========================================================================
   AÇÕES DO JOGADOR
   ========================================================================= */
function gainXp(amount){
  amount *= getMult('xpMult');
  S.xp += amount;
  S.stats.totalXpEarned += amount;
  while(S.xp >= xpToNext(S.level)){
    S.xp -= xpToNext(S.level);
    S.level++;
    S.staminaMax += 2;
    S.stats.hpMax += 4;
    S.stats.chakraMax += 4;
    toast(`Você alcançou o nível ${S.level}!`, 'Level Up', 'xp');
    const nr = rankForLevel(S.level);
    checkAchievements();
  }
}
function gainRyo(amount){
  amount = Math.round(amount * getMult('ryoMult'));
  S.ryo += amount;
  S.stats.totalRyoEarned += amount;
}
function addMaterial(id, qty){
  S.materials[id] = (S.materials[id]||0) + qty;
}
function randomMaterialDrop(){
  const m = MATERIALS[Math.floor(Math.random()*MATERIALS.length)];
  addMaterial(m.id, 1+Math.floor(Math.random()*3));
  return m;
}

/* ---- Treinamento ---- */
function doTraining(id){
  const t = TRAININGS.find(x=>x.id===id);
  const cost = trainingCost(t);
  if(S.stamina < cost) return;
  S.stamina -= cost;
  S.stats.trainingCount++;
  if(t.stat==='hpMax'){
    S.stats.hpMax += 1+Math.floor(S.level/5);
  } else if(t.stat==='chakraMax'){
    S.stats.chakraMax += 1+Math.floor(S.level/5);
  } else {
    S.stats[t.stat] += S.baseGain[t.stat];
    S.baseGain[t.stat] = Math.round((S.baseGain[t.stat]*1.004 + 0.002)*1000)/1000;
  }
  gainXp(2 + S.level*0.15);
  checkAchievements();
  renderTopbar(); renderTreino();
}
function trainAffinity(ek){
  if(S.stamina<5) return;
  S.stamina -= 5;
  const cur = S.elementAffinity[ek]||0;
  if(cur>=100) { toast('Afinidade já está no máximo.','Aviso','warn'); return; }
  S.elementAffinity[ek] = Math.min(100, cur + 2 + Math.random()*2);
  gainXp(1.5);
  renderTopbar(); renderCla();
}
function tryUnlockCombo(ek){
  const combo = COMBO_ELEMENTS[ek];
  const ok = combo.req.every(r=>(S.elementAffinity[r]||0) >= 20) && S.level>=20;
  if(!ok){ toast('Você precisa de nível 20+ e afinidade 20+ nos elementos base.','Requisito não cumprido','warn'); return; }
  S.elementAffinity[ek] = 1;
  toast(`Você despertou a afinidade a ${combo.name}!`, 'Novo Elemento', 'item');
  renderCla();
}

/* ---- Missões ---- */
function startMission(id){
  const m = MISSION_LIST.find(x=>x.id===id);
  if(S.level<m.minLevel || S.activeMissions.length>=S.missionSlots || S.stamina<m.stamina) return;
  S.stamina -= m.stamina;
  const dur = m.duration * 1000 * (1-talentEffect('missionSpeed')) * (1-(clanOf()&&clanOf().name==='Inuzuka'?0.1:0)) * (1-summonBonus('missionSpeed'));
  S.activeMissions.push({ id:'am'+Date.now()+Math.floor(Math.random()*999), missionId:m.id, startedAt:Date.now(), endsAt:Date.now()+dur });
  renderMissoes();
}
function collectMission(activeId){
  const idx = S.activeMissions.findIndex(a=>a.id===activeId);
  if(idx<0) return;
  const am = S.activeMissions[idx];
  if(Date.now() < am.endsAt) return;
  const m = MISSION_LIST.find(x=>x.id===am.missionId);
  gainXp(m.xp);
  gainRyo(m.ryo);
  S.stats.missionsCompleted++;
  if(Math.random()<m.dropChance){
    const mat = randomMaterialDrop();
    toast(`Você recebeu ${mat.ico} ${mat.name} da missão!`, 'Item Encontrado', 'item');
  }
  S.activeMissions.splice(idx,1);
  toast(`Missão "${m.name}" concluída! +${formatNum(m.xp)} XP, +${formatNum(m.ryo)} ryo`, 'Missão Completa', 'xp');
  checkAchievements();
  renderTopbar(); renderMissoes(); renderVisao();
}

/* ---- Jutsus ---- */
function learnJutsu(id){
  const j = JUTSU_LIST.find(x=>x.id===id);
  if(!j || S.jutsuLearned.includes(id)) return;
  if(!jutsuReqMet(j)) return;
  const cost = jutsuXpCost(j);
  if(S.xp < cost) { toast('XP insuficiente para aprender esta técnica.','Aviso','warn'); return; }
  S.xp -= cost;
  S.jutsuLearned.push(id);
  toast(`Você aprendeu ${j.name}!`, 'Novo Jutsu', 'item');
  checkAchievements();
  renderTopbar(); renderJutsus();
}

/* ---- Equipamentos ---- */
function buyItem(id){
  const it = EQUIP_LIST.find(x=>x.id===id);
  if(!it || S.level<it.reqLevel || S.ryo<it.cost || S.inventory.includes(id)) return;
  S.ryo -= it.cost;
  S.inventory.push(id);
  toast(`Você adquiriu ${it.name}. Equipe-a na aba Inventário.`, 'Compra Realizada', 'item');
  renderTopbar(); renderEquip();
}
function equipItem(id){
  const it = EQUIP_LIST.find(x=>x.id===id);
  if(!it || !S.inventory.includes(id)) return;
  S.equipped[it.slot] = id;
  renderTopbar(); renderInventario(); renderVisao();
}
function unequipItem(slot){
  S.equipped[slot] = null;
  renderTopbar(); renderInventario(); renderVisao();
}
function toggleLoadout(jutsuId){
  const idx = S.loadout.indexOf(jutsuId);
  if(idx>=0){ S.loadout.splice(idx,1); }
  else {
    if(S.loadout.length>=4){ toast('Você só pode escolher até 4 jutsus para batalha.','Conjunto Cheio','warn'); return; }
    S.loadout.push(jutsuId);
  }
  renderInventario();
}
function craftItem(tier){
  const recipes = {
    1:{mats:{ferro:5}, ryo:60, rarityWeights:[0.55,0.30,0.12,0.03,0,0]},
    2:{mats:{chakraCristal:5, ferro:8}, ryo:300, rarityWeights:[0.15,0.35,0.30,0.15,0.05,0]},
    3:{mats:{essenciaBesta:3, chakraCristal:5}, ryo:1500, rarityWeights:[0,0.05,0.20,0.35,0.30,0.10]},
  };
  const r = recipes[tier];
  const cost = Math.round(r.ryo*(1-talentEffect('craftDiscount')));
  for(const mk in r.mats){ if((S.materials[mk]||0) < r.mats[mk]){ toast('Materiais insuficientes.','Aviso','warn'); return; } }
  if(S.ryo < cost){ toast('Ryo insuficiente.','Aviso','warn'); return; }
  for(const mk in r.mats){ S.materials[mk] -= r.mats[mk]; }
  S.ryo -= cost;
  // pick rarity
  let roll = Math.random(), acc=0, rarityIdx=0;
  for(let i=0;i<r.rarityWeights.length;i++){ acc+=r.rarityWeights[i]; if(roll<=acc){ rarityIdx=i; break; } }
  const rarityId = RARITIES[rarityIdx].id;
  const pool = EQUIP_LIST.filter(e=>e.rarity===rarityId && S.level>=Math.max(1,e.reqLevel-10));
  const chosen = pool.length ? pool[Math.floor(Math.random()*pool.length)] : EQUIP_LIST.find(e=>e.rarity===rarityId);
  if(chosen && !S.inventory.includes(chosen.id)) S.inventory.push(chosen.id);
  S.stats.itemsCrafted++;
  toast(`Forja concluída! Você criou ${chosen?chosen.name:'um item'}.`, 'Item Forjado', 'item');
  checkAchievements();
  renderTopbar(); renderEquip();
}

/* ---- Invocações ---- */
function signSummonContract(id){
  const sm = SUMMONS.find(x=>x.id===id);
  if(!sm) return;
  S.ownedSummons = S.ownedSummons || [];
  if(S.ownedSummons.includes(id)) return;
  S.ownedSummons.push(id);
  toast(`Contrato de invocação com ${sm.name} firmado!`, 'Novo Contrato', 'item');
  renderInvocacoes();
}
function equipSummon(id){
  S.equipped.invocacao = id || null;
  renderInvocacoes(); renderInventario(); renderTopbar(); renderVisao();
}

/* ---- Mentores ---- */
function trainWithMentor(id){
  const m = MENTORS.find(x=>x.id===id);
  if(!m) return;
  const cd = S.mentorCooldown[id]||0;
  if(S.level<m.reqLevel || S.ryo<m.cost || cd>Date.now()) return;
  S.ryo -= m.cost;
  S.stats[m.reward.stat] += m.reward.amount;
  if(!S.mentorsLearned.includes(id)) S.mentorsLearned.push(id);
  S.mentorCooldown[id] = Date.now() + 60000;
  toast(`Treino com ${m.name} concluído! +${m.reward.amount} ${statLabel(m.reward.stat)}`, 'Treinamento Especial', 'xp');
  renderTopbar(); renderMentores();
}

/* ---- Combate ---- */
function playerPower(){
  const d = dojutsuBonusMult();
  let p = effectiveStat('force')*1.4 + effectiveStat('speed')*0.9 + effectiveStat('chakraControl')*0.7 + effectiveStat('intel')*0.6;
  p += S.jutsuLearned.length*3.2;
  p *= (1+d.crit);
  p *= (1 + S.level*0.01);
  return Math.round(p);
}
function fightBoss(id){
  const b = BOSSES.find(x=>x.id===id);
  if(!b || S.level<b.reqLevel) return;
  openBattle({name:b.name, ico:b.ico, hp:b.hp, power:b.power},
    ()=>{
      if(!S.bossesDefeatedList.includes(id)){ S.bossesDefeatedList.push(id); S.stats.bossesDefeated++; }
      gainXp(Math.round(b.hp*0.12));
      gainRyo(b.ryo);
      if(['itachi','kakuzu','hidan','deidara','pain','obito','madara'].includes(id)) S.stats.akatsukiDefeated++;
      toast(`Vitória! Você recebeu ${b.loot} e ${formatNum(b.ryo)} ryo.`, `Vitória contra ${b.name}`, 'item');
      checkAchievements();
      renderVisao();
    },
    ()=>{
      toast(`${b.name} era forte demais desta vez. Treine mais e tente novamente.`, `Derrota contra ${b.name}`, 'warn');
    }
  );
}

/* ---- Eventos do mundo ---- */
function doChuninExam(){
  if(S.level<15 || S.flags.chuninExamDone) return;
  openBattle({name:'Rival do Exame Chunin', ico:'🥷', hp:Math.round(300+S.level*8), power:Math.round(20+S.level*1.6)},
    ()=>{
      S.flags.chuninExamDone = true;
      gainXp(1200); gainRyo(600);
      toast('Você foi promovido a Chunin após o exame!', 'Exame Chunin', 'xp');
    },
    ()=>{ toast('Você não passou desta vez. Treine mais e tente novamente.', 'Exame Chunin', 'warn'); }
  );
}
function joinAnbu(){
  if(S.level<42 || S.flags.anbuJoined) return;
  openBattle({name:'Avaliador ANBU', ico:'🎭', hp:Math.round(900+S.level*10), power:Math.round(45+S.level*2)},
    ()=>{
      S.flags.anbuJoined = true;
      gainXp(2400); gainRyo(1200);
      toast('Você foi aceito nas fileiras da ANBU.', 'ANBU', 'xp');
    },
    ()=>{ toast('Você falhou na avaliação da ANBU. Tente novamente mais forte.', 'ANBU', 'warn'); }
  );
}
function triggerAkatsukiEvent(){
  if(S.level<30) return;
  S.flags.akatsukiEncounters++;
  openBattle({name:'Membro Desconhecido da Akatsuki', ico:'☁️', hp:Math.round(700+S.level*9), power:Math.round(40+S.level*1.8)},
    ()=>{
      gainXp(600); gainRyo(300);
      const mat = randomMaterialDrop();
      toast(`Você afugentou o membro da Akatsuki e recuperou ${mat.name}.`, 'Encontro com a Akatsuki', 'item');
    },
    ()=>{ toast('O membro da Akatsuki escapou, mas você saiu ferido.', 'Encontro com a Akatsuki', 'warn'); }
  );
}
function doGreatWar(){
  if(S.level<40 || S.flags.warDone) return;
  openBattle({name:'Exército do Edo Tensei', ico:'🎌', hp:Math.round(2600+S.level*14), power:Math.round(70+S.level*2.2)},
    ()=>{
      S.flags.warDone = true;
      S.stats.warsWon++;
      gainXp(6000); gainRyo(4000);
      toast('A Aliança Shinobi venceu a Quarta Grande Guerra Ninja!', 'Guerra Vencida', 'xp');
    },
    ()=>{ toast('A batalha foi árdua e a vitória escapou por pouco. Tente novamente.', 'Grande Guerra', 'warn'); }
  );
}
function masterBijuu(id){
  const bj = BIJUUS.find(x=>x.id===id);
  if(!bj || S.level<bj.reqLevel || S.bijuuMastered.includes(id)) return;
  openBattle({name:bj.name, ico:'🐉', hp:Math.round(2000+bj.n*1800+S.level*10), power:Math.round(60+bj.n*30)},
    ()=>{
      S.bijuuMastered.push(id);
      S.stats.chakraMax += 40;
      gainXp(1800);
      toast(`Você dominou uma fração do chakra de ${bj.name}!`, 'Chakra Dominado', 'item');
      checkAchievements();
    },
    ()=>{ toast(`O chakra de ${bj.name} era grande demais para ser controlado agora.`, 'Chakra Selvagem', 'warn'); }
  );
}

/* ---- Dōjutsu ---- */
function awakenDojutsu(type){
  if(S.dojutsu.type) return;
  if(type==='rinnegan' && S.level<45) return;
  if((type==='sharingan'||type==='byakugan') && S.level<10) return;
  S.dojutsu.type = type;
  S.dojutsu.stage = 1;
  toast(`Você despertou o ${dojutsuName(type)}!`, 'Dōjutsu Desperto', 'item');
  checkAchievements();
  renderTopbar(); renderDojutsu(); renderVisao();
}
function upgradeDojutsu(){
  const cost = dojutsuUpgradeCost();
  if(S.level<cost.level || S.ryo<cost.ryo || S.dojutsu.stage>=4) return;
  S.ryo -= cost.ryo;
  S.dojutsu.stage++;
  toast(`Seu ${dojutsuName(S.dojutsu.type)} evoluiu para o estágio ${S.dojutsu.stage}!`, 'Evolução Ocular', 'item');
  checkAchievements();
  renderTopbar(); renderDojutsu(); renderVisao();
}

/* ---- Talentos & Prestígio ---- */
function buyTalent(id){
  const t = TALENTS.find(x=>x.id===id);
  const pts = S.talents[id]||0;
  if(pts>=t.max) return;
  const cost = t.costBase*(pts+1);
  if(S.prestige.points < cost) { toast('Pontos de Prestígio insuficientes.','Aviso','warn'); return; }
  S.prestige.points -= cost;
  S.talents[id] = pts+1;
  renderTopbar(); renderTalentos();
}
function confirmPrestige(){
  const projected = projectedPrestigePoints();
  openModal(`<h2>♻️ Nova Geração</h2>
    <p class="small muted">Você reiniciará nível, atributos, ryo, missões e equipamentos. Você manterá: talentos, conquistas, chefes derrotados, mentores conhecidos e dōjutsu (reduzido em 1 estágio).</p>
    <p class="small mt8">Você receberá <b style="color:var(--purple)">+${projected} Pontos de Prestígio</b>.</p>
    <div class="flex gap mt14">
      <button class="btn danger" onclick="doPrestige()">Confirmar Prestígio</button>
      <button class="btn" onclick="closeModal()">Cancelar</button>
    </div>`);
}
function doPrestige(){
  const projected = projectedPrestigePoints();
  const keep = {
    talents: S.talents, achievementsUnlocked: S.achievementsUnlocked,
    bossesDefeatedList: S.bossesDefeatedList, mentorsLearned: S.mentorsLearned,
    prestige: { count: S.prestige.count+1, points: S.prestige.points + projected },
    clan: S.clan, name: S.name, bijuuMastered: S.bijuuMastered,
    dojutsu: S.dojutsu.type ? {type:S.dojutsu.type, stage:Math.max(1,S.dojutsu.stage-1)} : {type:null,stage:0},
    stats: Object.assign({}, freshState().stats, {
      trainingCount:S.stats.trainingCount, missionsCompleted:S.stats.missionsCompleted,
      totalRyoEarned:S.stats.totalRyoEarned, totalXpEarned:S.stats.totalXpEarned,
      bossesDefeated:S.stats.bossesDefeated, akatsukiDefeated:S.stats.akatsukiDefeated,
      itemsCrafted:S.stats.itemsCrafted, warsWon:S.stats.warsWon, playtimeSec:S.stats.playtimeSec
    }),
  };
  const startAff = talentEffect('startAffinity');
  S = freshState();
  Object.assign(S, keep);
  if(startAff>0){
    Object.keys(BASE_ELEMENTS).concat(Object.keys(YIN_YANG)).forEach(k=>{ S.elementAffinity[k]=startAff*8; });
  }
  closeModal();
  toast('Uma nova geração começa. Seu legado permanece.', 'Prestígio Realizado', 'xp');
  saveGame(true);
  renderAll();
}

/* ---- Conquistas ---- */
function checkAchievements(){
  let unlockedNew = false;
  ACHIEVEMENTS.forEach(a=>{
    if(!S.achievementsUnlocked.includes(a.id) && a.check(S)){
      S.achievementsUnlocked.push(a.id);
      unlockedNew = true;
      toast(`Conquista desbloqueada: ${a.name}`, '🏆 Conquista', 'item');
    }
  });
  if(unlockedNew && currentScreen==='conquistas') renderConquistas();
}

/* =========================================================================
   SISTEMA DE BATALHA (estilo Pokémon clássico, por turnos, usando jutsus)
   ========================================================================= */
let currentBattle = null; // transiente, não é salvo

function openBattle(def, onWin, onLose){
  if(S.stats.hp <= 1) S.stats.hp = Math.max(1, Math.round(effectiveHpMax()*0.35));
  currentBattle = {
    name: def.name, ico: def.ico||'👤',
    hp: def.hp, hpMax: def.hp, power: def.power,
    log: [`Um oponente apareceu: ${def.name}!`],
    finished: false, locked:false,
    onWin, onLose
  };
  renderBattleModal();
}

function loadoutMoves(){
  return (S.loadout||[]).map(id=>JUTSU_LIST.find(j=>j.id===id)).filter(Boolean);
}

function renderBattleModal(){
  const cb = currentBattle;
  if(!cb) return;
  const hpMax = effectiveHpMax(), chMax = effectiveChakraMax();
  const moves = loadoutMoves();
  const over = cb.finished;
  let movesHtml = `<button class="battle-move" onclick="battleMove('basic')" ${(cb.locked||over)?'disabled':''}>
      🥊 Ataque Básico <span class="bm-sub">Sem custo de chakra</span></button>`;
  moves.forEach(j=>{
    const cantAfford = S.stats.chakra < j.chakra;
    movesHtml += `<button class="battle-move" onclick="battleMove('${j.id}')" ${(cb.locked||over||cantAfford)?'disabled':''}>
      ${j.name} <span class="bm-sub">${CATS[j.cat]} • 🌀${j.chakra}${cantAfford?' (chakra insuficiente)':''}</span></button>`;
  });
  if(moves.length===0){
    movesHtml += `<p class="small muted" style="grid-column:span 2;">Você não escolheu jutsus para batalha. Vá até a aba <b>Inventário</b> e monte seu conjunto de até 4 técnicas.</p>`;
  }

  let endHtml = '';
  if(over){
    const win = cb.hp<=0;
    endHtml = `<div class="mt14" style="text-align:center;">
      <h3 style="color:${win?'var(--green)':'var(--sharingan)'};">${win?'🎉 Vitória!':'💥 Derrota...'}</h3>
      <button class="btn primary full mt8" onclick="closeBattleModal()">Continuar</button>
    </div>`;
  }

  const html = `
    <h2>⚔️ Batalha</h2>
    <div class="battle-vs">
      <div class="battle-side">
        <div class="bs-name">${escapeHtml(S.name)} <span class="small muted">Nv.${S.level}</span></div>
        <div class="progress-label"><span>❤️ ${Math.floor(S.stats.hp)}/${hpMax}</span></div>
        <div class="bar-track"><div class="bar-fill hp" style="width:${Math.max(0,S.stats.hp/hpMax*100)}%"></div></div>
        <div class="progress-label mt8"><span>🌀 ${Math.floor(S.stats.chakra)}/${chMax}</span></div>
        <div class="bar-track"><div class="bar-fill chakra" style="width:${Math.max(0,S.stats.chakra/chMax*100)}%"></div></div>
      </div>
      <div class="battle-ico">⚔️</div>
      <div class="battle-side" style="text-align:right;">
        <div class="bs-name" style="justify-content:flex-end;">${cb.name} <span class="battle-ico" style="font-size:20px;">${cb.ico}</span></div>
        <div class="progress-label"><span>❤️ ${Math.max(0,Math.floor(cb.hp))}/${cb.hpMax}</span></div>
        <div class="bar-track"><div class="bar-fill enemy" style="width:${Math.max(0,cb.hp/cb.hpMax*100)}%"></div></div>
      </div>
    </div>
    <div class="combat-log" id="battleLog">${cb.log.map(l=>`<div>${l}</div>`).join('')}</div>
    <div class="grid cols-2 mt14" style="gap:8px;">${movesHtml}</div>
    <div class="flex gap mt14">
      <button class="btn ghost small" onclick="fleeBattle()" ${over?'disabled':''}>Fugir</button>
    </div>
    ${endHtml}
  `;
  openModal(html, 'battle');
}

function battleMove(moveKey){
  const cb = currentBattle;
  if(!cb || cb.finished || cb.locked) return;
  let dmg = 0, label = 'Ataque Básico', healAmt = 0;
  if(moveKey === 'basic'){
    dmg = Math.round(effectiveStat('force')*0.6 + S.level*1.5 + Math.random()*6);
  } else {
    const j = JUTSU_LIST.find(x=>x.id===moveKey);
    if(!j) return;
    if(S.stats.chakra < j.chakra){
      cb.log.unshift(`Chakra insuficiente para usar ${j.name}!`);
      renderBattleModal();
      return;
    }
    S.stats.chakra -= j.chakra;
    label = j.name;
    if(j.cat === 'medico'){
      healAmt = Math.round(effectiveStat('intel')*1.1 + j.tier*16);
      S.stats.hp = Math.min(effectiveHpMax(), S.stats.hp + healAmt);
    } else {
      const statKey = CATEGORY_STAT[j.cat] || 'force';
      let base = j.tier*9 + effectiveStat(statKey)*0.85;
      if(j.element && ALL_ELEMENTS[j.element]) base *= 1 + (S.elementAffinity[j.element]||0)/220;
      const d = dojutsuBonusMult();
      if(j.cat==='ninjutsu') base *= d.ninjutsu;
      else if(j.cat==='genjutsu') base *= d.genjutsu;
      else if(j.cat==='taijutsu'||j.cat==='kenjutsu') base *= d.taijutsu;
      base *= (0.85 + Math.random()*0.3);
      if(Math.random() < d.crit) base *= 1.6;
      dmg = Math.round(base);
    }
  }
  if(healAmt>0){
    cb.log.unshift(`${S.name} usa ${label} e recupera ${healAmt} de vida!`);
  } else {
    cb.hp = Math.max(0, cb.hp - dmg);
    cb.log.unshift(`${S.name} usa ${label} e causa ${dmg} de dano em ${cb.name}!`);
  }
  if(cb.log.length>40) cb.log.length=40;

  if(cb.hp <= 0){
    renderBattleModal();
    finishBattle(true);
    return;
  }
  cb.locked = true;
  renderBattleModal();
  setTimeout(enemyTurn, 700);
}

function enemyTurn(){
  const cb = currentBattle;
  if(!cb || cb.finished) return;
  const mitig = 1 - Math.min(0.35, effectiveStat('speed')/500);
  const dmg = Math.round(cb.power * (0.8+Math.random()*0.4) * mitig);
  S.stats.hp = Math.max(0, S.stats.hp - dmg);
  cb.log.unshift(`${cb.name} contra-ataca e causa ${dmg} de dano em ${S.name}!`);
  if(cb.log.length>40) cb.log.length=40;
  cb.locked = false;
  if(S.stats.hp <= 0){
    renderBattleModal();
    finishBattle(false);
    return;
  }
  renderBattleModal();
}

function finishBattle(win){
  const cb = currentBattle;
  if(!cb || cb.finished) return;
  cb.finished = true;
  cb.log.unshift(win ? `Você derrotou ${cb.name}!` : `Você foi derrotado por ${cb.name}...`);
  renderBattleModal();
  if(win && cb.onWin) cb.onWin();
  if(!win && cb.onLose) cb.onLose();
  saveGame(true);
  renderTopbar();
}

function fleeBattle(){
  if(!currentBattle || currentBattle.finished) return;
  toast('Você fugiu da batalha.', 'Retirada', 'warn');
  currentBattle = null;
  closeModal();
  renderTopbar(); renderScreen(currentScreen);
}

function closeBattleModal(){
  currentBattle = null;
  closeModal();
  renderTopbar(); renderScreen(currentScreen);
}

/* =========================================================================
   LOOP PRINCIPAL / BOOT
   ========================================================================= */
function tick(deltaSec){
  // stamina regen
  S.stamina = Math.min(S.staminaMax, S.stamina + staminaRegenPerSec()*deltaSec);
  // hp / chakra regen
  const hpMax = effectiveHpMax(), chMax = effectiveChakraMax();
  S.stats.hp = Math.min(hpMax, S.stats.hp + (hpMax*0.01)*deltaSec);
  S.stats.chakra = Math.min(chMax, S.stats.chakra + (chMax*0.02)*deltaSec);
  S.stats.playtimeSec += deltaSec;
}

function gameLoop(){
  const now = Date.now();
  const delta = (now - S.lastTick)/1000;
  S.lastTick = now;
  tick(Math.min(delta,5));
  renderTopbar();
  if(currentScreen==='missoes') renderMissoes();
  if(currentScreen==='visao') renderVisao();
  if(currentScreen==='treino') renderTreino();
}

function offlineProgress(){
  const now = Date.now();
  const delta = Math.max(0,(now - S.lastTick)/1000);
  if(delta < 30) { S.lastTick = now; return; }
  const capped = Math.min(delta, 8*3600); // max 8h offline progress
  tick(capped);
  // auto-resolve missions that finished while away
  let collected = 0, xpGain=0, ryoGain=0;
  S.activeMissions = S.activeMissions.filter(am=>{
    if(am.endsAt <= now){
      const m = MISSION_LIST.find(x=>x.id===am.missionId);
      if(m){ xpGain+=m.xp; ryoGain+=m.ryo; collected++; S.stats.missionsCompleted++; }
      return false;
    }
    return true;
  });
  if(xpGain>0){ gainXp(xpGain); gainRyo(ryoGain); }
  S.lastTick = now;
  if(collected>0 || capped>60){
    const mins = Math.floor(capped/60);
    setTimeout(()=>toast(`Enquanto você estava fora (${mins} min), ${collected} missão(ões) foram concluídas.`, 'Bem-vindo de volta', 'xp'), 400);
  }
}

function nameOnboarding(){
  openModal(`<h2>忍 Bem-vindo ao Caminho Ninja</h2>
    <p class="small muted">Antes de começar sua jornada da Academia até Hokage, como devemos te chamar?</p>
    <input id="nameInput" type="text" maxlength="18" placeholder="Nome do seu ninja" style="width:100%;padding:9px;border-radius:8px;border:1px solid var(--line-soft);background:var(--bg-0);color:var(--text-0);font-size:13px;margin-top:8px;">
    <button class="btn primary full mt14" onclick="finishOnboarding()">Começar Jornada</button>`);
}
function finishOnboarding(){
  const v = document.getElementById('nameInput').value.trim();
  S.name = v || 'Ninja Sem Nome';
  closeModal();
  toast('Escolha seu clã na aba "Clã & Elementos" para receber bônus exclusivos!', 'Dica', 'item');
  switchScreen('cla');
  saveGame(true);
}

function boot(){
  buildShell();
  const hadSave = loadGame();
  offlineProgress();
  renderAll();
  switchScreen('visao');
  if(!hadSave){
    setTimeout(nameOnboarding, 300);
  }
  setInterval(gameLoop, 1000);
  setInterval(()=>saveGame(true), 20000);
  window.addEventListener('beforeunload', ()=>saveGame(true));
}
document.addEventListener('DOMContentLoaded', boot);
</script>
